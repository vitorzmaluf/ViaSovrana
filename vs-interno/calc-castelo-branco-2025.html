<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora de Frete — Via Sovrana</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: var(--bg); color: var(--tx); min-height: 100vh; padding-bottom: 60px; transition: background 0.2s, color 0.2s; }

    /* ── TEMAS ── */
    body.dark {
      --bg:#0d0d0d; --bgH:#111; --bgC:#141414; --bgI:#111;
      --bd:#1e1e1e; --bdM:#222; --bdS:#1a1a1a;
      --tx:#e5e5e5; --txM:#ccc; --txS:#aaa; --txF:#666; --txG:#555; --txT:#444;
      --ac:#eab308; --acD:#a37b00; --tabC:#000;
    }
    body.lite {
      --bg:#f4f4f5; --bgH:#ffffff; --bgC:#ffffff; --bgI:#f9f9f9;
      --bd:#e4e4e7; --bdM:#d4d4d8; --bdS:#e4e4e7;
      --tx:#111111; --txM:#333; --txS:#555; --txF:#777; --txG:#888; --txT:#aaa;
      --ac:#d97706; --acD:#92400e; --tabC:#ffffff;
    }

    /* ── LAYOUT ── */
    .header { background: var(--bgH); border-bottom: 1px solid var(--bd); padding: 18px 20px 14px; }
    .header-inner { max-width: 900px; margin: 0 auto; display: flex; justify-content: space-between; align-items: flex-start; }
    .header-title { font-size: 24px; font-weight: 800; color: var(--ac); margin: 0; }
    .header-sub { color: var(--txG); font-size: 12px; margin: 4px 0 0; }
    .header-meta { font-size: 10px; color: var(--txT); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 3px; }
    .theme-btn { padding: 8px 14px; border-radius: 8px; border: 1px solid var(--bdM); background: var(--bgC); color: var(--txS); cursor: pointer; font-size: 13px; font-weight: 600; margin-top: 4px; }

    .wrap { max-width: 900px; margin: 0 auto; padding: 0 14px; }

    /* ── TABS ── */
    .tabs { display: flex; gap: 4px; margin: 16px 0 20px; background: var(--bgH); border-radius: 8px; padding: 4px; flex-wrap: wrap; }
    .tab-btn { flex: 1 1 auto; padding: 8px 6px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; background: transparent; color: var(--txG); transition: all 0.15s; }
    .tab-btn.active { background: var(--ac); color: var(--tabC); }

    /* ── SECTION HEADING ── */
    .sec-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .sec-title { font-size: 12px; font-weight: 700; color: var(--ac); text-transform: uppercase; letter-spacing: 0.1em; }
    .sec-line { flex: 1; height: 1px; background: var(--bdM); }
    .sec-body { background: var(--bgC); border: 1px solid var(--bd); border-radius: 8px; padding: 16px 16px 4px; margin-bottom: 22px; }

    /* ── GRID ── */
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .grid4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; }
    .grid5 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 1fr; gap: 10px; }
    .grid2x2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    /* ── BOTÕES DE CIDADE / ZONA ── */
    .city-btn, .zone-btn, .simple-btn {
      padding: 8px; border-radius: 6px; border: 1px solid var(--bdM);
      background: var(--bgI); color: var(--txG);
      cursor: pointer; font-size: 11px; font-weight: 600; text-align: left;
      transition: all 0.15s; width: 100%;
    }
    .city-btn .sub { font-size: 10px; margin-top: 2px; color: var(--txT); }
    .city-btn.active { border-color: var(--ac); background: color-mix(in srgb, var(--ac) 13%, transparent); color: var(--ac); }
    .city-btn.active .sub { color: var(--acD); }

    /* ── SLIDER ── */
    .num-wrap { margin-bottom: 16px; }
    .num-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .num-label { color: var(--txG); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }
    .num-hint { color: var(--txT); font-size: 10px; margin-left: 8px; }
    .num-input { width: 100%; background: var(--bgI); border: 1px solid var(--bdM); border-radius: 6px; color: var(--tx); padding: 8px 12px; font-size: 14px; font-weight: 600; font-family: monospace; text-align: right; }
    .num-input:focus { outline: none; border-color: var(--ac); }

    /* ── CARDS ── */
    .stat-card { background: var(--bgC); border: 1px solid var(--bd); border-radius: 8px; padding: 12px; }
    .stat-label { font-size: 10px; color: var(--txG); text-transform: uppercase; margin-bottom: 4px; }
    .stat-val { font-family: monospace; font-size: 16px; font-weight: 700; }

    /* ── DRE ROW ── */
    .dre-row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--bdS); }
    .dre-label { color: var(--txF); font-size: 12px; }
    .dre-val { font-family: monospace; font-size: 12px; }
    .dre-val.bold { font-size: 14px; font-weight: 700; }

    /* ── RESULTADO ── */
    .result-box { background: var(--bgC); border: 1px solid color-mix(in srgb, var(--ac) 27%, transparent); border-radius: 10px; padding: 20px; margin-bottom: 14px; }
    .result-price { font-size: 52px; font-weight: 800; font-family: monospace; color: var(--ac); line-height: 1; }
    .ref-badge { margin-top: 8px; font-size: 12px; padding: 6px 10px; background: var(--bgI); border-radius: 6px; display: inline-block; }

    /* ── TABELA ── */
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th { padding: 9px 12px; text-align: left; color: var(--txG); font-weight: 600; font-size: 11px; border-bottom: 1px solid var(--bd); background: var(--bgC); }
    th:not(:first-child) { text-align: right; }
    td { padding: 9px 12px; border-bottom: 1px solid var(--bd); }
    td:not(:first-child) { text-align: right; font-family: monospace; color: var(--txM); }
    tr:nth-child(even) td { background: color-mix(in srgb, var(--bdS) 30%, transparent); }

    /* ── CLIENTE ROW ── */
    .cliente-row { background: var(--bgC); border: 1px solid var(--bd); border-radius: 8px; padding: 14px 16px; margin-bottom: 10px; }
    .cliente-grid { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 10px; align-items: center; }
    .field-label { font-size: 10px; color: var(--txG); text-transform: uppercase; margin-bottom: 6px; }
    select, input[type=number] { width: 100%; background: var(--bgI); border: 1px solid var(--bdM); border-radius: 6px; color: var(--tx); padding: 7px 10px; font-size: 12px; cursor: pointer; }
    .rem-btn { background: transparent; border: 1px solid var(--bdM); border-radius: 6px; color: var(--txG); cursor: pointer; padding: 7px 12px; font-size: 14px; margin-top: 20px; }
    .add-btn { width: 100%; padding: 10px; background: transparent; border: 1px dashed var(--bdM); border-radius: 8px; color: var(--txG); cursor: pointer; font-size: 13px; margin-top: 8px; }
    .cliente-footer { display: flex; gap: 16px; margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--bd); flex-wrap: wrap; align-items: center; }

    /* ── WARN ── */
    .warn { margin-top: 14px; padding: 12px 16px; background: rgba(251,146,60,0.08); border: 1px solid rgba(251,146,60,0.3); border-radius: 8px; font-size: 12px; color: #fb923c; }

    /* ── PROPOSTA ── */
    .verdict-box { border-radius: 10px; padding: 18px 20px; margin-bottom: 16px; }
    .verdict-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 800; }
    .ref-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--bdS); }
    .ref-row-label { color: var(--txS); font-size: 11px; }
    .ref-row-hint { color: var(--txT); font-size: 10px; }
    .contra-box { margin-top: 12px; padding: 12px 14px; border-radius: 6px; }
    .contra-label { font-size: 10px; text-transform: uppercase; margin-bottom: 4px; }
    .contra-val { font-family: monospace; font-size: 20px; font-weight: 800; color: var(--ac); }

    @media (max-width: 640px) {
      .grid2 { grid-template-columns: 1fr; }
      .grid5 { grid-template-columns: 1fr 1fr; }
      .cliente-grid { grid-template-columns: 1fr 1fr; }
      .result-price { font-size: 36px; }
    }
  </style>
</head>
<body class="dark">

<div class="header">
  <div class="header-inner">
    <div>
      <div class="header-meta">Via Sovrana · Calculadora Interna · Uso exclusivo</div>
      <h1 class="header-title">Calculadora de Frete</h1>
      <p class="header-sub">R$ 1,54/kg + taxa fixa por cidade · coleta no dia · entrega D+1</p>
    </div>
    <button class="theme-btn" id="themeBtn">☀ Claro</button>
  </div>
</div>

<div class="wrap">

  <div class="tabs" id="tabs">
    <button class="tab-btn active" data-tab="simulador">Envio Único</button>
    <button class="tab-btn" data-tab="dia">Simular Dia</button>
    <button class="tab-btn" data-tab="tabela">Tabela</button>
    <button class="tab-btn" data-tab="desconto">Proposta Cliente</button>
    <button class="tab-btn" data-tab="custos">Custos</button>
  </div>

  <div id="content"></div>

</div>

<script>
// ── DADOS ──────────────────────────────────────────────────────────────────
const LP = 0.0593, RKG = 1.54;
const ICMS_ALIQ = 0.12, ICMS_CRED = 0.20, ICMS_EFET = ICMS_ALIQ * (1 - ICMS_CRED); // 9,6% efetivo com crédito outorgado · Decreto SP 70.292/2025 · válido até 31/12/2026

const CIDADES = [
  { id:"itapevi",   label:"Itapevi",   km:40,  fixa:90,  ref:201  },
  { id:"itu",       label:"Itu",       km:80,  fixa:110, ref:null },
  { id:"sorocaba",  label:"Sorocaba",  km:95,  fixa:80,  ref:253  },
  { id:"salto",     label:"Salto",     km:95,  fixa:80,  ref:null },
  { id:"boituva",   label:"Boituva",   km:120, fixa:60,  ref:324  },
  { id:"cerquilho", label:"Cerquilho", km:120, fixa:60,  ref:null },
  { id:"tatui",     label:"Tatuí",     km:144, fixa:75,  ref:253  },
];
const ZONAS = [
  { id:"z1", label:"Zona 1", desc:"Casa Verde, Santana, Lapa, Pinheiros, Centro, Brás", dist:"até 10 km",  taxa:35,  cor:"#4ade80" },
  { id:"z2", label:"Zona 2", desc:"Vila Mariana, Tatuapé, Mooca, Ipiranga, Santo Amaro", dist:"10–20 km", taxa:55,  cor:"#60a5fa" },
  { id:"z3", label:"Zona 3", desc:"Jabaquara, Penha, Itaquera, Campo Limpo, Osasco",     dist:"20–35 km", taxa:80,  cor:"#fb923c" },
  { id:"z4", label:"Zona 4", desc:"Guarulhos, ABC, Cotia, Barueri, extremos",             dist:"35+ km",   taxa:120, cor:"#f87171" },
];
const PESOS = [30, 80, 150, 300, 500];

// ── ESTADO ─────────────────────────────────────────────────────────────────
const S = {
  tab: "simulador", dark: true,
  // Envio único
  cidade: "sorocaba", zona: "z1", peso: 100,
  // Dia
  clientes: [
    { id:1, cidade:"boituva",  zona:"z1", peso:80  },
    { id:2, cidade:"tatui",    zona:"z2", peso:100 },
    { id:3, cidade:"sorocaba", zona:"z1", peso:120 },
    { id:4, cidade:"itapevi",  zona:"z3", peso:60  },
  ],
  nextId: 5,
  // Proposta
  dcCidade:"sorocaba", dcZona:"z1", dcPeso:100, dcProposta:200, dcPesoDia:350,
  // Custos
  diesel:6.20, motorista:200, segVei:20, manut:41, parcela:100, pedagios:80, segCarga:19,
};

// ── HELPERS ────────────────────────────────────────────────────────────────
const fmt  = v => v.toLocaleString("pt-BR",{style:"currency",currency:"BRL",minimumFractionDigits:2});
const fmtN = (v,d=2) => v.toLocaleString("pt-BR",{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtKg = v => v + " kg";

function calcFrete(peso, cidadeId, zonaId) {
  const c = CIDADES.find(x => x.id === cidadeId);
  const z = ZONAS.find(x => x.id === zonaId);
  const carga = c.fixa + peso * RKG;
  const cobrado = carga + z.taxa;
  return { cobrado, carga, cidade:c, zona:z, efetKg: cobrado/peso };
}

function custoDia() {
  return (340/11)*S.diesel + S.motorista + S.segVei + S.manut + S.parcela + S.pedagios + S.segCarga;
}
function custoVar() {
  // Custos que variam com a viagem (combustível, pedágios, seguro carga)
  return (340/11)*S.diesel + S.pedagios + S.segCarga;
}
function custoFixo() {
  // Custos fixos independentes do número de clientes (motorista, seguro veículo, manutenção, parcela)
  return S.motorista + S.segVei + S.manut + S.parcela;
}

// ── RENDER HELPERS ─────────────────────────────────────────────────────────
function secHead(title) {
  return `<div class="sec-head"><span class="sec-title">${title}</span><div class="sec-line"></div></div>`;
}

function numInput(id, label, val, hint, type) {
  return `
    <div class="num-wrap">
      <div class="num-row">
        <div><span class="num-label">${label}</span>${hint?`<span class="num-hint">${hint}</span>`:""}</div>
      </div>
      <input class="num-input" type="number" id="${id}" value="${val}"
        step="${type==="brl"?5:type==="kg"?1:0.1}"
        data-state="${id}"
        oninput="onNumInput('${id}',this.value)">
    </div>`;
}

function cidadeBtns(selected, prefix) {
  return `<div class="grid2x2">` + CIDADES.map(c => `
    <button class="city-btn${selected===c.id?" active":""}"
      onclick="pick('${prefix}','${c.id}')">
      ${c.label}
      <div class="sub">${c.km} km · taxa ${fmt(c.fixa)}</div>
    </button>`).join("") + `</div>`;
}

function zonaBtns(selected, prefix) {
  return `<div class="grid2x2">` + ZONAS.map(z => `
    <button class="city-btn${selected===z.id?" active":""}"
      style="${selected===z.id?`border-color:${z.cor};color:${z.cor};background:${z.cor}22`:""}"
      onclick="pick('${prefix}z','${z.id}')">
      ${z.label} — ${fmt(z.taxa)}
      <div class="sub">${z.dist}</div>
    </button>`).join("") + `</div>`;
}

// ── TAB: ENVIO ÚNICO ───────────────────────────────────────────────────────
function renderSimulador() {
  const r         = calcFrete(S.peso, S.cidade, S.zona);
  const icms      = r.cobrado * ICMS_EFET;
  const imp       = r.cobrado * LP;
  const tributos  = icms + imp;
  const recLiq    = r.cobrado - tributos;
  const margBruta = r.cobrado > 0 ? (recLiq / r.cobrado) * 100 : 0;
  const diffM     = r.cidade.ref ? ((r.cobrado - r.cidade.ref) / r.cidade.ref * 100) : null;
  const zona      = ZONAS.find(z => z.id === S.zona);

  return `<div class="grid2">
    <div>
      ${secHead("Origem")}
      <div class="sec-body">${cidadeBtns(S.cidade,"c")}</div>
      ${secHead("Destino em SP")}
      <div class="sec-body">
        ${zonaBtns(S.zona,"c")}
        <div style="font-size:11px;color:var(--txT);padding:6px 0 2px;">${zona.desc}</div>
      </div>
      ${secHead("Peso")}
      <div class="sec-body">${numInput("peso","Peso do envio",S.peso,null,"kg")}</div>
    </div>
    <div>
      <div class="result-box">
        <div style="font-size:11px;color:var(--txG);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px;">Frete cobrado</div>
        <div class="result-price">${fmt(r.cobrado)}</div>
        ${diffM !== null ? `<div class="ref-badge">
          <span style="color:var(--txF)">vs RMX Log (1 dia): </span>
          <span style="font-family:monospace;color:${diffM<=0?"#4ade80":"#f87171"};font-weight:700">
            ${fmt(r.cidade.ref)} (${diffM>0?"+":""}${fmtN(diffM,1)}%)
          </span></div>` : ""}
        <div class="grid4" style="margin-top:10px;">
          ${[
            ["R$/kg efetivo",  "R$ "+fmtN(r.efetKg,2)],
            ["Taxa fixa",      fmt(r.cidade.fixa)],
            ["Entrega",        fmt(r.zona.taxa)],
            ["Tributos",       fmtN((ICMS_EFET+LP)*100,1)+"%"],
          ].map(([l,v])=>`
          <div class="stat-card"><div class="stat-label">${l}</div><div class="stat-val" style="font-size:13px;color:var(--txM)">${v}</div></div>`).join("")}
        </div>
      </div>
      <div style="background:var(--bgH);border:1px solid var(--bd);border-radius:8px;padding:14px 16px;">
        <div style="font-size:10px;color:var(--txT);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px;">Composição do frete · impacto tributário</div>
        ${[
          ["Taxa fixa cidade",               fmt(r.cidade.fixa),    "var(--txM)"],
          [`Carga (${S.peso}kg × R$${fmtN(RKG,2)})`, fmt(S.peso*RKG), "var(--txM)"],
          ["Entrega zona",                   fmt(r.zona.taxa),      "var(--txM)"],
          ["Frete cobrado",                  fmt(r.cobrado),        "#4ade80"],
          ["(-) ICMS 9,6% (crédito outorg.)",fmt(icms),            "#fb923c"],
          ["(-) LP 5,93%",                   fmt(imp),              "#fb923c"],
          ["Receita líquida",       fmt(recLiq),       "var(--ac)", true],
          ["Margem bruta s/ tributos", fmtN(margBruta,1)+"%", margBruta>=80?"#4ade80":margBruta>=70?"#eab308":"#f87171", true],
        ].map(([l,v,cor,bold])=>`
          <div class="dre-row">
            <span class="dre-label">${l}</span>
            <span class="dre-val${bold?" bold":""}" style="color:${cor}">${v}</span>
          </div>`).join("")}
      </div>
    </div>
  </div>`;
}

// ── TAB: SIMULAR DIA ───────────────────────────────────────────────────────
function renderDia() {
  const cd = custoDia();
  const pesoTotal = S.clientes.reduce((a,x)=>a+x.peso,0);
  const linhas = S.clientes.map(x => {
    const r = calcFrete(x.peso, x.cidade, x.zona);
    const icms = r.cobrado*ICMS_EFET;
    const imp = r.cobrado*LP;
    const custo = pesoTotal>0?(x.peso/pesoTotal)*cd:0;
    const lucro = r.cobrado-imp-icms-custo;
    const margem = r.cobrado>0?(lucro/r.cobrado)*100:0;
    return {...x,...r,icms,imp,custo,lucro,margem};
  });
  const recTotal    = linhas.reduce((a,l)=>a+l.cobrado,0);
  const icmsTotal   = linhas.reduce((a,l)=>a+l.icms,0);
  const impTotal    = linhas.reduce((a,l)=>a+l.imp,0);
  const tribTotal   = icmsTotal + impTotal;
  const lucroTotal  = linhas.reduce((a,l)=>a+l.lucro,0);
  const margemDia   = recTotal>0?(lucroTotal/recTotal)*100:0;

  return `
    <div class="grid5" style="margin-bottom:20px;">
      ${[
        ["Peso total",  pesoTotal+" kg",          "#60a5fa"],
        ["Receita",     fmt(recTotal),             "#4ade80"],
        ["Tributos",    fmt(tribTotal),            "#fb923c"],
        ["Lucro",       fmt(lucroTotal),           lucroTotal>0?"var(--ac)":"#f87171"],
        ["Margem",      fmtN(margemDia,1)+"%",    margemDia>=25?"#4ade80":"#f87171"],
      ].map(([l,v,cor])=>`
        <div class="stat-card">
          <div class="stat-label">${l}</div>
          <div class="stat-val dia-stat" style="color:${cor}">${v}</div>
        </div>`).join("")}
    </div>
    ${linhas.map(l=>`
      <div class="cliente-row dia-row" data-id="${l.id}">
        <div class="cliente-grid">
          <div>
            <div class="field-label">Origem</div>
            <select data-action="cidade" data-id="${l.id}">
              ${CIDADES.map(c=>`<option value="${c.id}"${l.cidade===c.id?" selected":""}>${c.label}</option>`).join("")}
            </select>
          </div>
          <div>
            <div class="field-label">Entrega SP</div>
            <select data-action="zona" data-id="${l.id}">
              ${ZONAS.map(z=>`<option value="${z.id}"${l.zona===z.id?" selected":""}>${z.label} — ${fmt(z.taxa)}</option>`).join("")}
            </select>
          </div>
          <div>
            <div class="field-label">Peso (kg)</div>
            <input type="number" min="1" max="900" value="${l.peso}"
              data-action="peso" data-id="${l.id}">
          </div>
          <button class="rem-btn" onclick="remCliente(${l.id})">✕</button>
        </div>
        <div class="cliente-footer">
          <span class="dia-frete" style="font-family:monospace;font-size:16px;font-weight:700;color:var(--ac)">${fmt(l.cobrado)}</span>
          <span class="dia-efet" style="font-size:11px;color:var(--txG)">R$ ${fmtN(l.efetKg,2)}/kg</span>
          <span style="font-size:11px;color:var(--txG)">Margem: <span class="dia-marg" style="color:${l.margem>=25?"#4ade80":"#f87171"}">${fmtN(l.margem,1)}%</span></span>
          <span style="font-size:11px;color:var(--txG)">Lucro: <span class="dia-lucro" style="color:var(--txS)">${fmt(l.lucro)}</span></span>
        </div>
      </div>`).join("")}
    <button class="add-btn" onclick="addCliente()">+ Adicionar cliente</button>
    ${pesoTotal<250?`<div class="warn">⚠ Peso total abaixo de 250 kg — margem reduzida.</div>`:""}
  `;
}

// ── TAB: TABELA ────────────────────────────────────────────────────────────
function renderTabela() {
  return `
    <div style="margin-bottom:16px;padding:10px 14px;background:var(--bgC);border:1px solid var(--bd);border-radius:8px;font-size:12px;color:var(--txF)">
      Fórmula: <strong style="color:var(--ac)">taxa fixa + peso × R$ ${fmtN(RKG,2)}/kg + entrega zona</strong> · Calibrado com dados reais de mercado
    </div>
    ${CIDADES.map(cidade=>`
      <div style="margin-bottom:24px;">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;">
          <span style="font-size:13px;font-weight:700;color:var(--ac)">${cidade.label}</span>
          <span style="font-size:11px;color:var(--txG)">${cidade.km} km de SP</span>
          <span style="font-size:11px;color:#60a5fa">taxa fixa: ${fmt(cidade.fixa)}</span>
          ${cidade.ref?`<span style="font-size:11px;color:var(--txT)">ref. mercado: ${fmt(cidade.ref)}</span>`:""}
        </div>
        <div style="background:var(--bgH);border:1px solid var(--bd);border-radius:8px;overflow:hidden;">
          <table>
            <thead><tr>
              <th>Entrega</th>
              ${PESOS.map(p=>`<th style="text-align:right">${p} kg</th>`).join("")}
            </tr></thead>
            <tbody>
              ${ZONAS.map(zona=>`<tr>
                <td>
                  <span style="color:${zona.cor};font-weight:700">${zona.label}</span>
                  <span style="color:var(--txT);font-size:10px;margin-left:8px">${zona.dist} · +${fmt(zona.taxa)}</span>
                </td>
                ${PESOS.map(p=>`<td>${fmt(calcFrete(p,cidade.id,zona.id).cobrado)}</td>`).join("")}
              </tr>`).join("")}
            </tbody>
          </table>
        </div>
      </div>`).join("")}`;
}

// ── TAB: PROPOSTA ──────────────────────────────────────────────────────────
function renderDesconto() {
  const cd = custoDia();
  const r = calcFrete(S.dcPeso, S.dcCidade, S.dcZona);
  const tabela = r.cobrado;
  const custoRat = S.dcPesoDia>0?(S.dcPeso/S.dcPesoDia)*cd:0;
  const icms = S.dcProposta*ICMS_EFET;
const imp = S.dcProposta*LP;
  const lucro = S.dcProposta-imp-icms-custoRat;
  const margem = S.dcProposta>0?(lucro/S.dcProposta)*100:0;
  const desconto = tabela-S.dcProposta;
  const descPct = tabela>0?(desconto/tabela)*100:0;
  const minViavel = custoRat/(1-LP-ICMS_EFET);
  const margTab = tabela>0?((tabela-tabela*LP-custoRat)/tabela)*100:0;
  const contra = Math.max(minViavel*1.15, r.cidade.fixa+r.zona.taxa+50);
  const descMaxPct = tabela>0?Math.max(0,(1-contra/tabela)*100):0;
  let veredito, cor, icon;
  if (S.dcProposta>=tabela)              { veredito="Acima da tabela — aceite";      cor="#4ade80"; icon="✓"; }
  else if (S.dcProposta>=minViavel*1.15) { veredito="Abaixo da tabela mas viável";   cor="#eab308"; icon="~"; }
  else if (S.dcProposta>=minViavel)      { veredito="Margem apertada — negocie";     cor="#fb923c"; icon="!"; }
  else                                   { veredito="Abaixo do custo — recuse";      cor="#f87171"; icon="✗"; }

  return `<div class="grid2">
    <div>
      ${secHead("Dados do envio")}
      <div class="sec-body">
        <div style="margin-bottom:14px;">
          <div style="font-size:11px;color:var(--txG);text-transform:uppercase;margin-bottom:8px;">Cidade de coleta</div>
          <div class="grid2x2">${CIDADES.map(c=>`
            <button class="city-btn${S.dcCidade===c.id?" active":""}" onclick="pickDc('cidade','${c.id}')">${c.label}</button>`).join("")}
          </div>
        </div>
        <div style="margin-bottom:14px;">
          <div style="font-size:11px;color:var(--txG);text-transform:uppercase;margin-bottom:8px;">Zona de entrega</div>
          <div class="grid2x2">${ZONAS.map(z=>`
            <button class="city-btn${S.dcZona===z.id?" active":""}"
              style="${S.dcZona===z.id?`border-color:${z.cor};color:${z.cor};background:${z.cor}22`:""}"
              onclick="pickDc('zona','${z.id}')">${z.label}</button>`).join("")}
          </div>
        </div>
        ${numInput("dcPeso","Peso do envio (kg)",S.dcPeso,null,"kg")}
      </div>
      ${secHead("Proposta do cliente")}
      <div class="sec-body">
        ${numInput("dcProposta","Valor proposto pelo cliente",S.dcProposta,null,"brl")}
      </div>
      ${secHead("Base de rateio")}
      <div class="sec-body">${numInput("dcPesoDia","Peso total estimado do dia",S.dcPesoDia,"para ratear custo fixo","kg")}</div>
    </div>
    <div>
      <div class="verdict-box" style="background:${cor}11;border:1px solid ${cor}66;">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
          <div class="verdict-icon" style="background:${cor}22;border:2px solid ${cor};color:${cor}">${icon}</div>
          <div style="font-size:13px;font-weight:700;color:${cor}">${veredito}</div>
        </div>
        <div class="grid2x2">
          ${[
            ["Proposta", fmt(S.dcProposta), "var(--txM)"],
            ["Nossa tabela", fmt(tabela), "#60a5fa"],
            ["Diferença", (desconto>=0?"-":"+")+fmt(Math.abs(desconto)), desconto>0?"#f87171":"#4ade80"],
            ["Desconto", fmtN(descPct,1)+"%", desconto>0?"#f87171":"#4ade80"],
          ].map(([l,v,c])=>`
            <div style="background:var(--bgI);border-radius:6px;padding:10px 12px;">
              <div style="font-size:10px;color:var(--txG);text-transform:uppercase;margin-bottom:3px">${l}</div>
              <div style="font-family:monospace;font-size:15px;font-weight:700;color:${c}">${v}</div>
            </div>`).join("")}
        </div>
      </div>
      <div style="background:var(--bgC);border:1px solid var(--bd);border-radius:8px;padding:14px 16px;margin-bottom:14px;">
        <div style="font-size:10px;color:var(--txT);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px;">Se aceitar</div>
        ${[
          ["Proposta", fmt(S.dcProposta), "#4ade80"],
          ["(-) ICMS 9,6% (c/ crédito outorgado)", fmt(icms), "#fb923c"],
          ["(-) LP 5,93%", fmt(imp), "#fb923c"],
          ["(-) Custo rateado", fmt(custoRat), "#f87171"],
          ["Lucro", fmt(lucro), lucro>=0?"var(--ac)":"#f87171", true],
          ["Margem", fmtN(margem,1)+"%", margem>=20?"#4ade80":margem>=0?"#fb923c":"#f87171", true],
        ].map(([l,v,c,b])=>`
          <div class="dre-row">
            <span class="dre-label">${l}</span>
            <span class="dre-val${b?" bold":""}" style="color:${c}">${v}</span>
          </div>`).join("")}
      </div>
      <div style="background:var(--bgH);border:1px solid var(--bd);border-radius:8px;padding:14px 16px;">
        <div style="font-size:10px;color:var(--txT);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px;">Referências</div>
        ${[
          ["Nossa tabela", fmt(tabela), "margem "+fmtN(margTab,1)+"%", "#60a5fa"],
          ["Mínimo absoluto", fmt(minViavel), "só cobre custo + impostos", "#fb923c"],
          ["Mínimo recomendado +15%", fmt(minViavel*1.15), "margem mínima aceitável", "var(--ac)"],
        ].map(([l,v,h,c])=>`
          <div class="ref-row">
            <div><div class="ref-row-label">${l}</div><div class="ref-row-hint">${h}</div></div>
            <span style="font-family:monospace;font-size:14px;font-weight:700;color:${c}">${v}</span>
          </div>`).join("")}
        <div class="contra-box" style="background:color-mix(in srgb,var(--ac) 7%,transparent);border:1px solid color-mix(in srgb,var(--ac) 20%,transparent)">
          <div class="contra-label" style="color:var(--acD)">Contraproposta sugerida</div>
          <div class="contra-val">${fmt(contra)}</div>
          <div style="font-size:11px;color:var(--txF);margin-top:4px">
            ${desconto>0?"Desconto máximo: "+fmtN(descMaxPct,1)+"%":"Proposta acima do mínimo"}
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

// ── TAB: CUSTOS ────────────────────────────────────────────────────────────
function renderCustos() {
  const cd = custoDia();
  return `
    <div style="background:color-mix(in srgb,var(--ac) 7%,transparent);border:1px solid var(--ac);border-radius:10px;padding:18px 20px;margin-bottom:20px;">
      <div style="font-size:11px;color:var(--acD);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px;">Custo total do dia</div>
      <div style="font-family:monospace;font-size:42px;font-weight:800;color:var(--ac);line-height:1">${fmt(cd)}</div>
      <div style="font-size:12px;color:var(--txF);margin-top:6px">R$ ${fmtN(cd/340,2)}/km · R$ ${fmtN(cd/20,2)}/dia rateado</div>
    </div>
    ${secHead("Custos Operacionais · 340 km/dia")}
    <div class="sec-body">
      ${numInput("diesel","Preço do diesel",S.diesel,null,"rpl")}
      ${numInput("motorista","Diária do motorista",S.motorista,null,"brl")}
      ${numInput("segVei","Seguro veículo/dia",S.segVei,"~R$400/mês ÷ 20 dias","brl")}
      ${numInput("manut","Manutenção/dia",S.manut,"340km × R$0,12","brl")}
      ${numInput("parcela","Parcela veículo/dia",S.parcela,"parcela ÷ 20 dias","brl")}
      ${numInput("pedagios","Pedágios/dia",S.pedagios,"Castelo Branco","brl")}
      ${numInput("segCarga","Seguro de carga/dia",S.segCarga,"RCTR-C + RC-DC · obrigatório ANTT","brl")}
    </div>
    <div style="background:var(--bgC);border:1px solid var(--bd);border-radius:8px;padding:16px 16px 10px;">
      <div style="font-size:12px;font-weight:700;color:var(--ac);margin-bottom:12px;text-transform:uppercase;">DRE do Dia</div>
      ${[
        ["Combustível",    (340/11)*S.diesel,  "340÷11×R$"+fmtN(S.diesel,2)],
        ["Motorista",      S.motorista,         ""],
        ["Seguro veículo", S.segVei,            ""],
        ["Manutenção",     S.manut,             ""],
        ["Parcela veículo",S.parcela,           ""],
        ["Pedágios",       S.pedagios,          ""],
        ["Seguro carga",   S.segCarga,          "RCTR-C + RC-DC"],
      ].map(([l,v,h])=>`
        <div class="dre-row">
          <div><span style="color:var(--txS);font-size:12px">${l}</span>${h?`<span style="color:var(--txT);font-size:10px;margin-left:8px">${h}</span>`:""}</div>
          <span style="font-family:monospace;color:#f87171;font-size:12px">${fmt(v)}</span>
        </div>`).join("")}
      <div style="display:flex;justify-content:space-between;padding:10px 0 4px;">
        <span style="color:var(--ac);font-weight:700">Custo total/dia</span>
        <span style="font-family:monospace;color:var(--ac);font-weight:700;font-size:16px">${fmt(cd)}</span>
      </div>
    </div>
    <div style="margin-top:16px;background:var(--bgC);border:1px solid var(--bd);border-radius:10px;padding:16px 20px;">
      <div style="font-size:12px;font-weight:700;color:var(--ac);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:14px;">Break-even diário</div>
      ${(()=>{
        const cd = custoDia();
        const beTrib   = cd / (1 - LP - ICMS_EFET);          // cobre custo + tributos
        const be20     = cd / (1 - LP - ICMS_EFET - 0.20);   // + 20% margem
        const be25     = cd / (1 - LP - ICMS_EFET - 0.25);   // + 25% margem
        const be30     = cd / (1 - LP - ICMS_EFET - 0.30);   // + 30% margem
        return `
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:14px;">
          ${[
            ["Zero margem",  fmt(beTrib), "só cobre custo + tributos", "#fb923c"],
            ["Margem 20%",   fmt(be20),   "mínimo recomendado",         "#eab308"],
            ["Margem 25%",   fmt(be25),   "meta operacional",           "#4ade80"],
            ["Margem 30%",   fmt(be30),   "meta ideal",                 "#60a5fa"],
          ].map(([l,v,h,cor])=>`
            <div style="background:var(--bgI);border:1px solid var(--bd);border-radius:8px;padding:10px 12px;">
              <div style="font-size:10px;color:var(--txG);text-transform:uppercase;margin-bottom:2px">${l}</div>
              <div style="font-family:monospace;font-size:16px;font-weight:700;color:${cor}">${v}</div>
              <div style="font-size:10px;color:var(--txT);margin-top:2px">${h}</div>
            </div>`).join("")}
        </div>
        <div style="font-size:11px;color:var(--txF);line-height:1.7;">
          Receita mínima/dia necessária para cobrir custo operacional + ICMS 9,6% + LP 5,93%.
          Para atingir a meta de 25%, com frete médio de R$ 250/envio, você precisa de
          <strong style="color:var(--ac)">${Math.ceil(be25/250)} envios/dia</strong>.
        </div>`;
      })()}
    </div>
    <div style="margin-top:14px;padding:12px 16px;background:color-mix(in srgb,var(--ac) 5%,transparent);border:1px solid color-mix(in srgb,var(--ac) 13%,transparent);border-radius:8px;font-size:11px;color:var(--txG);line-height:1.8;">
      <strong style="color:var(--txS)">Fórmula:</strong> Frete = taxa fixa cidade + (peso × R$ ${fmtN(RKG,2)}/kg) + entrega zona · LP 5,93% + ICMS 9,6% (crédito outorgado 20% · Decreto SP 70.292/2025 · válido até 31/12/2026).
    </div>`;
}

// ── RENDER PRINCIPAL ───────────────────────────────────────────────────────
function render() {
  const map = { simulador:renderSimulador, dia:renderDia, tabela:renderTabela, desconto:renderDesconto, custos:renderCustos };
  document.getElementById("content").innerHTML = map[S.tab]();
  attachEvents();
}

function attachEvents() {
  document.querySelectorAll(".num-input[data-state]").forEach(el => {
    el.addEventListener("input", function() { onNumInput(this.dataset.state, this.value); });
  });

}

// ── EVENTOS ────────────────────────────────────────────────────────────────
const STATE_MAP = {
  peso:"peso", diesel:"diesel", motorista:"motorista", segVei:"segVei",
  manut:"manut", parcela:"parcela", pedagios:"pedagios", segCarga:"segCarga",
  dcPeso:"dcPeso", dcProposta:"dcProposta", dcPesoDia:"dcPesoDia",
};

function onNumInput(id, val) {
  const v = parseFloat(val) || 0;
  if (STATE_MAP[id] !== undefined) S[STATE_MAP[id]] = v;
  const map = { simulador:renderSimulador, dia:renderDia, desconto:renderDesconto, custos:renderCustos };
  if (map[S.tab]) {
    const focused = document.activeElement ? (document.activeElement.id || document.activeElement.dataset.state) : null;
    document.getElementById("content").innerHTML = map[S.tab]();
    attachEvents();
    if (focused) {
      const el = document.getElementById(focused) || document.querySelector(`[data-state="${focused}"]`);
      if (el) { el.focus(); el.select(); }
    }
  }
}

function pick(prefix, val) {
  if (prefix === "c") S.cidade = val;
  else if (prefix === "cz") S.zona = val;
  render();
}

function pickDc(field, val) {
  if (field === "cidade") S.dcCidade = val;
  else if (field === "zona") S.dcZona = val;
  render();
}

function addCliente() {
  S.clientes.push({ id:S.nextId++, cidade:"sorocaba", zona:"z1", peso:80 });
  render();
}

function remCliente(id) {
  S.clientes = S.clientes.filter(x => x.id !== id);
  render();
}

function updCliente(id, key, val) {
  S.clientes = S.clientes.map(x => x.id===id ? {...x,[key]:typeof val==="string"?val:Number(val)} : x);
  // Re-render only the summary cards (not the full DOM, preserves select focus)
  const linhas = (() => {
    const cd = custoDia();
    const pesoTotal = S.clientes.reduce((a,x)=>a+x.peso,0);
    return S.clientes.map(x => {
      const r = calcFrete(x.peso, x.cidade, x.zona);
      const icms = r.cobrado*ICMS_EFET;
      const imp  = r.cobrado*LP;
      const custo = pesoTotal>0?(x.peso/pesoTotal)*cd:0;
      const lucro = r.cobrado-imp-icms-custo;
      const margem = r.cobrado>0?(lucro/r.cobrado)*100:0;
      return {...x,...r,icms,imp,custo,lucro,margem};
    });
  })();
  const recTotal  = linhas.reduce((a,l)=>a+l.cobrado,0);
  const icmsTotal = linhas.reduce((a,l)=>a+l.icms,0);
  const impTotal  = linhas.reduce((a,l)=>a+l.imp,0);
  const tribTotal = icmsTotal+impTotal;
  const lucroTotal= linhas.reduce((a,l)=>a+l.lucro,0);
  const margemDia = recTotal>0?(lucroTotal/recTotal)*100:0;
  // Update summary cards
  const vals = [
    S.clientes.reduce((a,x)=>a+x.peso,0)+" kg",
    fmt(recTotal), fmt(tribTotal), fmt(lucroTotal),
    fmtN(margemDia,1)+"%"
  ];
  const colors = ["#60a5fa","#4ade80","#fb923c",lucroTotal>0?"var(--ac)":"#f87171",margemDia>=25?"#4ade80":"#f87171"];
  document.querySelectorAll(".dia-stat").forEach((el,i) => {
    if (vals[i] !== undefined) { el.textContent = vals[i]; el.style.color = colors[i]; }
  });
  // Update each row footer
  linhas.forEach(l => {
    const row = document.querySelector(`.dia-row[data-id="${l.id}"]`);
    if (!row) return;
    const spans = row.querySelectorAll(".dia-frete,.dia-efet,.dia-marg,.dia-lucro");
    if (spans[0]) spans[0].textContent = fmt(l.cobrado);
    if (spans[1]) spans[1].textContent = "R$ "+fmtN(l.efetKg,2)+"/kg";
    if (spans[2]) { spans[2].textContent = fmtN(l.margem,1)+"%"; spans[2].style.color = l.margem>=25?"#4ade80":"#f87171"; }
    if (spans[3]) spans[3].textContent = fmt(l.lucro);
  });
}

// ── TABS ───────────────────────────────────────────────────────────────────
document.getElementById("tabs").addEventListener("click", e => {
  const btn = e.target.closest(".tab-btn");
  if (!btn) return;
  S.tab = btn.dataset.tab;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b===btn));
  render();
});

// ── TEMA ───────────────────────────────────────────────────────────────────
document.getElementById("themeBtn").addEventListener("click", () => {
  S.dark = !S.dark;
  document.body.className = S.dark ? "dark" : "lite";
  document.getElementById("themeBtn").textContent = S.dark ? "☀ Claro" : "☾ Escuro";
});

// ── EVENT DELEGATION para Simular Dia ─────────────────────────────────────
document.getElementById("content").addEventListener("change", function(e) {
  const el = e.target;
  const action = el.dataset.action;
  const id = parseInt(el.dataset.id);
  if (!action || !id) return;
  if (action === "peso") updCliente(id, "peso", Math.max(1, Number(el.value)));
  else updCliente(id, action, el.value);
});

// ── INIT ───────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
